torch:
  device: mps
  seed: 42
  num_workers: 2

datasets:
  detection:
    dir: "datasets/detection"
    val_split: 0.15
  hold_color:
    dir: "datasets/hold_color"
    val_split: 0.15
  hold_type:
    dir: "datasets/hold_type"
    val_split: 0.15
  color_gnn:
    dir: "datasets/color_gnn"
  seg_merged:
    dir: "datasets/seg_merged"
    val_split: 0.1
  color_crops:
    dir: "datasets/color_crops"
    val_split: 0.1

models:
  mask_rcnn_hold:
    pipeline: mask_rcnn
    dataset: "datasets/detection"
    num_classes: 3
    trainable_backbone_layers: 2
    min_size: 1333
    max_size: 1600
    box_detections_per_img: 300
    anchor_sizes: [[8, 16, 32, 64, 128]]
    anchor_ratios: [[0.5, 1.0, 2.0]]
    tile_inference: true
    tile_size: 1024
    tile_overlap: 128
    train:
      batch_size: 4
      lr: 0.005
      epochs: 11
      scheduler: cosine
      lr_milestones: [5, 8]
      lr_gamma: 0.1
    validate:
      batch_size: 1

  hold_color_catboost:
    pipeline: color_handcrafted
    dataset: "datasets/hold_color"
    hue_bins: 8
    dominant_colors: 3
    erode_pixels: 3
    color_normalization: shades_of_gray
    train:
      batch_size: 1
      lr: 0.1
      epochs: 1
      scheduler: cosine
    validate:
      batch_size: 1

  hold_color_classifier:
    pipeline: hold_classifier
    dataset: "datasets/hold_color"
    backbone: resnet18
    color_normalization: shades_of_gray
    crop_size: 128
    crop_padding: 8
    use_mask_channel: true
    use_segmentor_mask: true
    augment_mode: color
    segmentor_model: mask_rcnn_hold
    segmentor_weights: "weights/hold_v2.pt"
    train:
      batch_size: 16
      lr: 0.00001
      epochs: 20
      scheduler: cosine
      freeze_backbone_epochs: 5
      freeze_backbone_lr: 0.001
    validate:
      batch_size: 16

  hold_type_classifier:
    pipeline: hold_classifier
    dataset: "datasets/hold_type"
    backbone: convnext_tiny
    crop_size: 224
    crop_padding: 16
    use_mask_channel: false
    augment_mode: type
    segmentor_model: mask_rcnn_hold
    segmentor_weights: "weights/hold.pt"
    train:
      batch_size: 16
      lr: 0.00001
      epochs: 20
      scheduler: cosine
      freeze_backbone_epochs: 5
      freeze_backbone_lr: 0.005
    validate:
      batch_size: 16

  color_gnn:
    pipeline: color_gnn
    dataset: "datasets/color_gnn"
    hidden_dim: 128
    num_layers: 2
    k_neighbors: 6
    color_model_type: catboost
    color_model: hold_color_catboost
    segmentor_model: mask_rcnn_hold
    segmentor_weights: "weights/hold_v2.pt"
    color_weights: "weights/color_catboost.cbm"
    route_loss_weight: 0.5
    train:
      batch_size: 8
      lr: 0.001
      epochs: 50
      scheduler: cosine
    validate:
      batch_size: 8

  mask2former_hold:
    pipeline: mask2former
    dataset: "datasets/seg_merged"
    num_classes: 2
    id2label:
      0: hold
      1: volume
    model_name_or_path: "facebook/mask2former-swin-large-coco-instance"
    image_size: 1024
    detector_image_size: 1536
    score_thr: 0.3
    mask_threshold: 0.5
    overlap_mask_area_threshold: 0.8
    max_detections: 500
    tile_if_over: 2048
    tile_batch: 4
    use_tta: false
    amp_dtype: bf16
    gradient_checkpointing: true
    channels_last: true
    ema_decay: 0.9998
    backbone_multiplier: 0.1
    no_decay_on_norm_bias: true
    weight_decay: 0.05
    warmup_steps: 1000
    min_lr_factor: 0.01
    grad_clip: 1.0
    grad_accum: 2
    val_every_epochs: 2
    train:
      batch_size: 4
      lr: 0.0001
      epochs: 40
      scheduler: cosine
    validate:
      batch_size: 1

  eva02_type:
    pipeline: eva02_type
    dataset: "datasets/hold_type"
    backbone: "eva02_base_patch14_448.mim_in22k_ft_in22k_in1k"
    image_size: 448
    amp_dtype: bf16
    grad_accum: 2
    weight_decay: 0.05
    warmup_epochs: 3
    label_smoothing: 0.05
    ema_decay: 0.9998
    train:
      batch_size: 32
      lr: 0.0002
      epochs: 40
      scheduler: cosine
    validate:
      batch_size: 32

  eva02_color:
    pipeline: eva02_color
    dataset: "datasets/color_crops"
    backbone: "eva02_base_patch14_448.mim_in22k_ft_in22k_in1k"
    num_classes: 10
    class_names:
      - Black
      - Blue
      - Gray
      - Green
      - Orange
      - Pink
      - Purple
      - Red
      - White
      - Yellow
    image_size: 448
    amp_dtype: bf16
    grad_accum: 2
    weight_decay: 0.05
    warmup_epochs: 3
    label_smoothing: 0.05
    ema_decay: 0.9998
    train:
      batch_size: 64
      lr: 0.0003
      epochs: 40
      scheduler: cosine
    validate:
      batch_size: 64
