torch:
  device: cuda
  seed: 42
  num_workers: 2

datasets:
  detection:
    dir: "datasets/detection"
    val_split: 0.15
  hold_color:
    dir: "datasets/hold_color"
    val_split: 0.15
  hold_type:
    dir: "datasets/hold_type"
    val_split: 0.15
  color_gnn:
    dir: "datasets/color_gnn"

models:
  mask_rcnn_hold:
    pipeline: mask_rcnn
    dataset: "datasets/detection"
    num_classes: 3
    trainable_backbone_layers: 2
    min_size: 1333
    max_size: 1600
    box_detections_per_img: 300
    anchor_sizes: [[8, 16, 32, 64, 128]]
    anchor_ratios: [[0.5, 1.0, 2.0]]
    tile_inference: true
    tile_size: 1024
    tile_overlap: 128
    train:
      batch_size: 4
      lr: 0.005
      epochs: 11
      scheduler: cosine
      lr_milestones: [5, 8]
      lr_gamma: 0.1
    validate:
      batch_size: 1

  hold_color_classifier:
    pipeline: hold_classifier
    dataset: "datasets/hold_color"
    backbone: convnext_tiny
    crop_size: 224
    crop_padding: 16
    use_mask_channel: true
    augment_mode: color
    segmentor_model: mask_rcnn_hold
    segmentor_weights: "weights/hold_v2.pt"
    train:
      batch_size: 16
      lr: 0.00001
      epochs: 20
      scheduler: cosine
      freeze_backbone_epochs: 5
      freeze_backbone_lr: 0.001
    validate:
      batch_size: 16

  hold_type_classifier:
    pipeline: hold_classifier
    dataset: "datasets/hold_type"
    backbone: convnext_tiny
    crop_size: 224
    crop_padding: 16
    use_mask_channel: false
    augment_mode: type
    segmentor_model: mask_rcnn_hold
    segmentor_weights: "weights/hold.pt"
    train:
      batch_size: 16
      lr: 0.00001
      epochs: 20
      scheduler: cosine
      freeze_backbone_epochs: 5
      freeze_backbone_lr: 0.005
    validate:
      batch_size: 16

  color_gnn:
    pipeline: color_gnn
    dataset: "datasets/color_gnn"
    hidden_dim: 128
    num_layers: 2
    k_neighbors: 6
    color_model: hold_color_classifier
    segmentor_model: mask_rcnn_hold
    segmentor_weights: "weights/hold_v2.pt"
    color_weights: "weights/hold_color_v6.pt"
    route_loss_weight: 0.5
    train:
      batch_size: 8
      lr: 0.001
      epochs: 50
      scheduler: cosine
    validate:
      batch_size: 8
