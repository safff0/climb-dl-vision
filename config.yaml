torch:
  device: cuda
  seed: 42
  num_workers: 2

datasets:
  detection:
    dir: "datasets/detection"
    val_split: 0.15
  hold_color:
    dir: "datasets/hold_color"
    val_split: 0.15
  hold_type:
    dir: "datasets/hold_type"
    val_split: 0.15

models:
  mask_rcnn_hold:
    pipeline: mask_rcnn
    dataset: "datasets/detection"
    num_classes: 3
    trainable_backbone_layers: 2
    min_size: 1024
    max_size: 1333
    box_detections_per_img: 300
    anchor_sizes: [[16, 32, 64, 128, 256]]
    anchor_ratios: [[0.5, 1.0, 2.0]]
    tile_inference: true
    tile_size: 1024
    tile_overlap: 128
    train:
      batch_size: 4
      lr: 0.005
      epochs: 11
      scheduler: cosine
      lr_milestones: [5, 8]
      lr_gamma: 0.1
    validate:
      batch_size: 1

  hold_color_classifier:
    pipeline: hold_classifier
    dataset: "datasets/hold_color"
    backbone: convnext_tiny
    crop_size: 128
    crop_padding: 16
    use_mask_channel: false
    augment_mode: color
    segmentor_model: mask_rcnn_hold
    segmentor_weights: "weights/hold.pt"
    train:
      batch_size: 64
      lr: 0.001
      epochs: 30
      scheduler: cosine
      freeze_backbone_epochs: 5
      freeze_backbone_lr: 0.01
    validate:
      batch_size: 128

  hold_type_classifier:
    pipeline: hold_classifier
    dataset: "datasets/hold_type"
    backbone: convnext_tiny
    crop_size: 128
    crop_padding: 16
    use_mask_channel: false
    augment_mode: type
    segmentor_model: mask_rcnn_hold
    segmentor_weights: "weights/hold.pt"
    train:
      batch_size: 64
      lr: 0.0001
      epochs: 30
      scheduler: cosine
      freeze_backbone_epochs: 10
      freeze_backbone_lr: 0.005
    validate:
      batch_size: 128
